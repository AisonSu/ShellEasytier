name: CI

on:
  push:
    branches: [ main, master, dev ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Run automated test suite
      run: sh test/test.sh

    - name: Run mock tests
      run: sh test/mock_test.sh

  shellcheck:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install shellcheck
      run: sudo apt-get install -y shellcheck

    - name: Run shellcheck
      run: |
        find scripts -name "*.sh" -type f -exec shellcheck --shell=sh --severity=warning {} \; 2>&1 || echo "Shellcheck completed with warnings"

  docker:
    runs-on: ubuntu-latest
    needs: [test, shellcheck]

    steps:
    - uses: actions/checkout@v4

    - name: Build Docker test image
      run: docker build -f Dockerfile.test -t shelleasytier:test .

    - name: Run Docker tests
      run: docker run --rm shelleasytier:test
