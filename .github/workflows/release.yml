name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build release package
      run: |
        # 创建发布目录
        mkdir -p release/ShellEasytier

        # 复制必要文件
        cp -r scripts release/ShellEasytier/
        cp -r starts release/ShellEasytier/
        cp -r test release/ShellEasytier/
        cp install.sh release/ShellEasytier/
        cp build.sh release/ShellEasytier/
        cp version release/ShellEasytier/
        cp LICENSE release/ShellEasytier/
        cp README.md release/ShellEasytier/
        cp Makefile release/ShellEasytier/
        cp Dockerfile.test release/ShellEasytier/
        cp docker-compose.test.yml release/ShellEasytier/
        cp .dockerignore release/ShellEasytier/

        # 创建必要的目录结构
        mkdir -p release/ShellEasytier/bin
        mkdir -p release/ShellEasytier/configs

        # 打包
        cd release
        tar -czf ShellEasytier.tar.gz ShellEasytier/

        # 显示结果
        ls -lh ShellEasytier.tar.gz

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: release/ShellEasytier.tar.gz
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
