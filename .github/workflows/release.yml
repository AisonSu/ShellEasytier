name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare release version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          printf '%s\n' "$VERSION" > version

      - name: Validate shell syntax
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r file; do
            if grep -qE '^#!/usr/bin/env bash|^#!/bin/bash' "$file"; then
              bash -n "$file"
            else
              sh -n "$file"
            fi
          done < <(git ls-files '*.sh')

      - name: Build release tarball
        shell: bash
        run: |
          set -euo pipefail
          bash pack_release.sh

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp install.sh dist/install.sh
          cp install_en.sh dist/install_en.sh
          cp ShellEasytier.tar.gz dist/ShellEasytier.tar.gz

          for archdir in pkg/*; do
            [ -d "$archdir" ] || continue
            arch="$(basename "$archdir")"

            cp "$archdir/easytier-core" "dist/easytier-core-$arch"
            cp "$archdir/easytier-cli" "dist/easytier-cli-$arch"

            if [ -f "$archdir/easytier-web-embed" ]; then
              cp "$archdir/easytier-web-embed" "dist/easytier-web-embed-$arch"
            fi
          done

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
