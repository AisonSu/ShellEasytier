name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Extract version from tag
      id: get_version
      run: |
        VERSION=${GITHUB_REF#refs/tags/}
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "Version: $VERSION"

    - name: Update version file
      run: |
        VERSION="${{ steps.get_version.outputs.VERSION }}"
        echo "$VERSION" > version
        echo "Updated version file to: $VERSION"

    - name: Commit version update
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add version
        git commit -m "chore: update version to ${{ steps.get_version.outputs.VERSION }} [skip ci]" || echo "No changes"
        git push origin HEAD:main || echo "Push failed"

    - name: Get EasyTier version
      id: get_et_version
      run: |
        ET_VERSION=$(curl -sL --connect-timeout 10 "https://api.github.com/repos/EasyTier/EasyTier/releases/latest" | grep -o '"tag_name": "[^"]*"' | head -1 | cut -d'"' -f4)
        [ -z "$ET_VERSION" ] && ET_VERSION="v2.4.5"
        echo "ET_VERSION=$ET_VERSION" >> $GITHUB_OUTPUT
        echo "EasyTier version: $ET_VERSION"

    - name: Build packages for all architectures
      run: |
        VERSION="${{ steps.get_version.outputs.VERSION }}"
        ET_VERSION="${{ steps.get_et_version.outputs.ET_VERSION }}"

        # 定义架构列表
        ARCHS="x86_64 aarch64 armv7 mips mipsel"

        for ARCH in $ARCHS; do
          echo "========================================="
          echo "Building for architecture: $ARCH"
          echo "========================================="

          BUILD_DIR="/tmp/selleasytier_build_${ARCH}"
          rm -rf "$BUILD_DIR"
          mkdir -p "$BUILD_DIR/bin"

          # 复制脚本文件
          cp -r scripts "$BUILD_DIR/"
          cp -r starts "$BUILD_DIR/"
          cp version "$BUILD_DIR/"
          cp README.md "$BUILD_DIR/" 2>/dev/null || true
          cp LICENSE "$BUILD_DIR/" 2>/dev/null || true
          cp install.sh "$BUILD_DIR/"
          cp build.sh "$BUILD_DIR/"
          cp Makefile "$BUILD_DIR/" 2>/dev/null || true
          cp Dockerfile.test "$BUILD_DIR/" 2>/dev/null || true
          cp docker-compose.test.yml "$BUILD_DIR/" 2>/dev/null || true
          cp .dockerignore "$BUILD_DIR/" 2>/dev/null || true

          # 下载对应架构的 EasyTier
          echo "Downloading EasyTier for $ARCH..."
          curl -sL --connect-timeout 30 \
            "https://github.com/EasyTier/EasyTier/releases/download/${ET_VERSION}/easytier-linux-${ARCH}-${ET_VERSION}.zip" \
            -o "/tmp/easytier-${ARCH}.zip" || {
            echo "Failed to download for $ARCH, will try without binary"
            continue
          }

          # 解压
          unzip -o "/tmp/easytier-${ARCH}.zip" -d "/tmp/easytier-${ARCH}/" 2>/dev/null || {
            echo "Failed to extract for $ARCH"
            continue
          }

          # 复制 easytier-core
          cp "/tmp/easytier-${ARCH}/easytier-core" "$BUILD_DIR/bin/easytier-core" 2>/dev/null || \
          cp "/tmp/easytier-${ARCH}/easytier-linux-${ARCH}/easytier-core" "$BUILD_DIR/bin/easytier-core" 2>/dev/null || {
            echo "Could not find easytier-core for $ARCH"
            find "/tmp/easytier-${ARCH}/" -type f
          }

          if [ -f "$BUILD_DIR/bin/easytier-core" ]; then
            chmod +x "$BUILD_DIR/bin/easytier-core"
            echo "✓ EasyTier binary added for $ARCH"
          fi

          # 创建架构特定的压缩包（包含 ShellEasytier 目录层级）
          mkdir -p /tmp/release
          cp -r "$BUILD_DIR" /tmp/release/ShellEasytier
          tar -czf "ShellEasytier-${ARCH}.tar.gz" -C /tmp/release .
          ls -lh "ShellEasytier-${ARCH}.tar.gz"
          rm -rf /tmp/release/ShellEasytier

          # 清理
          rm -rf "$BUILD_DIR" "/tmp/easytier-${ARCH}.zip" "/tmp/easytier-${ARCH}/"
        done

        # 也创建一个通用包（不含二进制，需要运行时下载）
        echo "========================================="
        echo "Building generic package (no binary)"
        echo "========================================="

        BUILD_DIR="/tmp/selleasytier_build_generic"
        rm -rf "$BUILD_DIR"
        mkdir -p "$BUILD_DIR/bin"

        cp -r scripts "$BUILD_DIR/"
        cp -r starts "$BUILD_DIR/"
        cp version "$BUILD_DIR/"
        cp README.md "$BUILD_DIR/" 2>/dev/null || true
        cp LICENSE "$BUILD_DIR/" 2>/dev/null || true
        cp install.sh "$BUILD_DIR/"
        cp build.sh "$BUILD_DIR/"
        cp Makefile "$BUILD_DIR/" 2>/dev/null || true
        cp Dockerfile.test "$BUILD_DIR/" 2>/dev/null || true
        cp docker-compose.test.yml "$BUILD_DIR/" 2>/dev/null || true
        cp .dockerignore "$BUILD_DIR/" 2>/dev/null || true

        mkdir -p /tmp/release
        cp -r "$BUILD_DIR" /tmp/release/ShellEasytier
        tar -czf "ShellEasytier-generic.tar.gz" -C /tmp/release .
        ls -lh "ShellEasytier-generic.tar.gz"
        rm -rf /tmp/release/ShellEasytier "$BUILD_DIR"

    - name: Upload Release Assets
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ShellEasytier-*.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
