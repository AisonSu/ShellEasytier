name: Update Version on Release

on:
  push:
    tags:
      - 'v*'

jobs:
  update-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Extract version from tag
      id: get_version
      run: |
        VERSION=${GITHUB_REF#refs/tags/}
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "Version: $VERSION"

    - name: Update version file and commit
      run: |
        VERSION="${{ steps.get_version.outputs.VERSION }}"
        echo "$VERSION" > version
        echo "Updated version file to: $VERSION"
        cat version

    - name: Commit and push version update
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add version
        git commit -m "chore: update version to ${{ steps.get_version.outputs.VERSION }} [skip ci]" || echo "No changes to commit"
        git push origin HEAD:main --force || echo "Push failed"

    - name: Re-checkout with updated version
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Verify version file
      run: |
        echo "Version file content:"
        cat version

    - name: Download EasyTier binaries
      run: |
        # 获取 EasyTier 最新版本
        ET_VERSION=$(curl -sL --connect-timeout 10 "https://api.github.com/repos/EasyTier/EasyTier/releases/latest" | grep -o '"tag_name": "[^"]*"' | head -1 | cut -d'"' -f4)
        [ -z "$ET_VERSION" ] && ET_VERSION="v2.4.5"
        echo "EasyTier version: $ET_VERSION"

        # 创建 bin 目录
        mkdir -p bin

        # 下载各个架构的 EasyTier
        ET_ARCHS="x86_64 aarch64 armv7 mips mipsel"
        for arch in $ET_ARCHS; do
          echo "Downloading easytier-linux-${arch}..."
          curl -sL --connect-timeout 10 "https://github.com/EasyTier/EasyTier/releases/download/${ET_VERSION}/easytier-linux-${arch}-${ET_VERSION}.zip" -o "/tmp/easytier-${arch}.zip" || continue
          unzip -o "/tmp/easytier-${arch}.zip" -d "/tmp/easytier-${arch}/" 2>/dev/null || continue
          # 复制 easytier-core 到 bin 目录，重命名为包含架构名
          cp "/tmp/easytier-${arch}/easytier-core" "bin/easytier-core-${arch}" 2>/dev/null || true
          rm -rf "/tmp/easytier-${arch}.zip" "/tmp/easytier-${arch}/"
        done

        # 为当前架构创建默认的 easytier-core 链接
        ls -la bin/

    - name: Create Release Package
      run: |
        VERSION="${{ steps.get_version.outputs.VERSION }}"
        BUILD_DIR="/tmp/selleasytier_build"

        # 清理并创建构建目录
        rm -rf "$BUILD_DIR"
        mkdir -p "$BUILD_DIR"

        # 复制文件（确保使用更新后的 version 文件）
        cp -r scripts "$BUILD_DIR/"
        cp -r starts "$BUILD_DIR/"
        cp -r bin "$BUILD_DIR/"
        cp version "$BUILD_DIR/"
        cp README.md "$BUILD_DIR/" 2>/dev/null || true
        cp LICENSE "$BUILD_DIR/" 2>/dev/null || true
        cp install.sh "$BUILD_DIR/"
        cp build.sh "$BUILD_DIR/"
        cp Makefile "$BUILD_DIR/" 2>/dev/null || true
        cp Dockerfile.test "$BUILD_DIR/" 2>/dev/null || true
        cp docker-compose.test.yml "$BUILD_DIR/" 2>/dev/null || true
        cp .dockerignore "$BUILD_DIR/" 2>/dev/null || true

        # 验证 version 文件
        echo "Build dir version file:"
        cat "$BUILD_DIR/version"

        # 显示 bin 目录内容
        echo "Binaries:"
        ls -la "$BUILD_DIR/bin/"

        # 创建压缩包
        tar -czf "ShellEasytier.tar.gz" -C "$BUILD_DIR" .
        ls -lh ShellEasytier.tar.gz

        # 验证压缩包内的 version 文件
        echo "Package version file content:"
        tar -O -zxf ShellEasytier.tar.gz version

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v1
      with:
        files: ShellEasytier.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
